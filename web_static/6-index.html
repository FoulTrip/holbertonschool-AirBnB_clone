<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" dir="ltr" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <link rel="stylesheet" href="./styles/4-common.css" />
    <link rel="stylesheet" href="./styles/3-header.css" />
    <link rel="stylesheet" href="./styles/3-footer.css" />
    <link rel="stylesheet" href="./styles/6-filters.css" />
    <title>AirBnB clone</title>
  </head>
  <body>
    <header>
      <div class="logo">
        <img src="./images/icon.png" alt="icon" />
      </div>
    </header>
    <div class="container">
      <section class="filters">
        <section class="locations">
          <h3>State</h3>
          <h4>Fake contents</h4>
          <div class="popover">
            <ul class="state-list">
              <li>
                <h2>State 1</h2>
                <ul class="city-list">
                  <li>City 1</li>
                  <li>City 2</li>
                </ul>
              </li>
              <li>
                <h2>State 2</h2>
                <ul class="city-list">
                  <li>City 3</li>
                  <li>City 4</li>
                </ul>
              </li>
            </ul>
          </div>
        </section>
        <section class="amenities">
          <h3>Amenities</h3>
          <h4>Fake contents</h4>
          <div class="popover">
            <ul class="state-list">
              <li>
                <h2>State 1</h2>
                <ul class="city-list">
                  <li>City 1</li>
                  <li>City 2</li>
                </ul>
              </li>
              <li>
                <h2>State 2</h2>
                <ul class="city-list">
                  <li>City 3</li>
                  <li>City 4</li>
                </ul>
              </li>
            </ul>
          </div>
        </section>
        <button class="search_btn">Search</button>
      </section>
    </div>
    <footer>Holberton School</footer>
  </body>
</html>
